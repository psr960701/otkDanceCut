name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests zhipuai sniffio

      - name: Get PR diff
        id: diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GitHub API 获取 PR diff
          echo "获取 PR #${{ github.event.pull_request.number }} 的 diff..."
          
          # 方法1: 使用 GitHub API
          DIFF=$(curl -s -L \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}")
          
          # 调试输出
          echo "Diff 长度: ${#DIFF} 字符"
          
          # 保存到文件
          echo "$DIFF" > /tmp/pr_diff.txt
          
          # 显示前几行用于调试
          echo "Diff 前 500 字符:"
          head -c 500 /tmp/pr_diff.txt
          echo ""
          
          echo "diff_file=/tmp/pr_diff.txt" >> $GITHUB_OUTPUT

      - name: AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/review.py \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --diff-file "/tmp/pr_diff.txt"
